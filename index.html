<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JARVIS 5.0 | SYSTEM ONLINE</title>
    <style>
        :root {
            --glow-color: #00ffff;
            --bg-color: #050505;
            --accent-color: rgba(0, 255, 255, 0.12);
        }

        body {
            background: var(--bg-color);
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace; /* More technical feel */
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Futuristic Grid & Scanning Line */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, var(--accent-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--accent-color) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, transparent, rgba(0, 255, 255, 0.05), transparent);
            animation: scan 8s linear infinite;
            z-index: -1;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        /* Arc Reactor UI */
        .reactor-container {
            margin-top: 40px;
            position: relative;
            display: inline-block;
        }

        #circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid var(--glow-color);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--glow-color);
            box-shadow: 0 0 20px var(--glow-color), inset 0 0 15px var(--glow-color);
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.8);
        }

        /* Rotating Outer Ring */
        .ring {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed var(--glow-color);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #circle.active {
            box-shadow: 0 0 50px var(--glow-color), inset 0 0 30px var(--glow-color);
            transform: scale(1.05);
            border-style: double;
        }

        /* Buttons & Inputs */
        .controls {
            margin-top: 20px;
            z-index: 10;
        }

        #voiceBtn {
            padding: 12px 30px;
            font-size: 16px;
            background: transparent;
            color: var(--glow-color);
            border: 2px solid var(--glow-color);
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--glow-color);
        }

        #voiceBtn:hover {
            background: var(--glow-color);
            color: black;
            box-shadow: 0 0 25px var(--glow-color);
        }

        .search-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 90%;
            max-width: 500px;
        }

        #searchInput {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glow-color);
            color: white;
            outline: none;
        }

        #searchBtn {
            padding: 10px 20px;
            background: var(--glow-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Output Feed */
        #output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column-reverse; /* Latest at top */
            scrollbar-width: thin;
            scrollbar-color: var(--glow-color) transparent;
        }

        .output-text {
            margin: 10px auto;
            padding: 15px;
            background: rgba(0, 40, 40, 0.3);
            border-left: 3px solid var(--glow-color);
            width: 90%;
            max-width: 600px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input { color: #88ffff; font-style: italic; }
        .response { color: #ffffff; }

        #status { font-size: 14px; margin-top: 10px; letter-spacing: 2px; }

        @media (max-width: 480px) {
            #circle { width: 140px; height: 140px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="reactor-container">
        <div class="ring"></div>
        <div id="circle">JARVIS</div>
    </div>

    <div class="controls">
        <button id="voiceBtn">🎤 Initialize Voice Command</button>
        <div id="status">STATUS: SYSTEM STANDBY</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter directive...">
        <button id="searchBtn">EXECUTE</button>
    </div>

    <div id="output"></div>

    <script>
        // ---------- CONFIG ----------
        const API_KEY = "YOUR_OPENAI_API_KEY"; // Ensure key is added here
        const MODEL = "gpt-4o-mini";
        const SYSTEM_PROMPT = `You are JARVIS, a sophisticated AI assistant created by Jeetendra. 
        Tone: Professional, helpful, robotic but elegant. 
        Identity: If asked who made you, say "I was created by Jeetendra." 
        Keep responses concise.`;

        // ---------- DOM ----------
        const statusEl = document.getElementById("status");
        const circleEl = document.getElementById("circle");
        const output = document.getElementById("output");
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const voiceBtn = document.getElementById("voiceBtn");

        // ---------- Speech Logic ----------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = "en-US";
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            // Try to find a male/robotic sounding voice
            utter.voice = voices.find(v => v.name.includes("Google UK English Male")) || voices[0];
            utter.pitch = 0.8;
            utter.rate = 1.0;
            window.speechSynthesis.speak(utter);
        }

        // ---------- API Integration ----------
        async function askJarvis(prompt, isVoice = false) {
            statusEl.textContent = "STATUS: PROCESSING DATA...";
            circleEl.classList.add("active");
            
            const userMsg = document.createElement("div");
            userMsg.className = "output-text input";
            userMsg.textContent = "> " + prompt;
            output.prepend(userMsg);

            const aiMsg = document.createElement("div");
            aiMsg.className = "output-text response";
            output.prepend(aiMsg);

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: prompt }
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    
                    for (const line of lines) {
                        if (line.startsWith("data: ") && !line.includes("[DONE]")) {
                            const data = JSON.parse(line.substring(6));
                            const content = data.choices[0].delta.content || "";
                            fullText += content;
                            aiMsg.textContent = fullText;
                        }
                    }
                }

                if (isVoice) speakText(fullText);
                statusEl.textContent = "STATUS: IDLE";
            } catch (error) {
                aiMsg.textContent = "ERROR: Connection to mainframe failed.";
                statusEl.textContent = "STATUS: ERROR";
            } finally {
                circleEl.classList.remove("active");
            }
        }

        // ---------- Event Listeners ----------
        searchBtn.onclick = () => {
            const val = searchInput.value.trim();
            if (val) {
                askJarvis(val, false);
                searchInput.value = "";
            }
        };

        if (recognition) {
            voiceBtn.onclick = () => recognition.start();
            recognition.onstart = () => {
                statusEl.textContent = "STATUS: LISTENING...";
                circleEl.classList.add("active");
            };
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                askJarvis(transcript, true);
            };
            recognition.onend = () => circleEl.classList.remove("active");
        }

        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchBtn.click();
        });

        // Initial Greeting
        window.onload = () => {
            const welcome = "Systems initialized. JARVIS 5.0 is online. How can I help, Sir?";
            const el = document.createElement("div");
            el.className = "output-text response";
            el.textContent = welcome;
            output.prepend(el);
            // speakText(welcome); // Optional: uncomment if you want voice on load
        };
    </script>
</body>
</html>
